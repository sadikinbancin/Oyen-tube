name: Debug Main Deploy Log

on:
  push:
    branches: [agent/probe-main-v06-status]
    paths:
      - ".github/workflows/debug-main-deploy-log.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download exact failed main deploy job log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/oyen-main-deploy-debug
          curl --fail-with-body --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/89169312667/logs" \
            --output /tmp/oyen-main-deploy-debug/main-deploy-job.log
          grep -nEi "error|exception|traceback|failed|runtime|spaces|zero|gpu|sync|clone|push" \
            /tmp/oyen-main-deploy-debug/main-deploy-job.log \
            > /tmp/oyen-main-deploy-debug/main-deploy-errors.txt || true
          tail -n 240 /tmp/oyen-main-deploy-debug/main-deploy-job.log \
            > /tmp/oyen-main-deploy-debug/main-deploy-tail.txt
      - uses: actions/upload-artifact@v4
        with:
          name: oyen-main-deploy-exact-log
          path: /tmp/oyen-main-deploy-debug
          retention-days: 1
          if-no-files-found: error
