name: Diagnose Main Oyen V0.6

on:
  push:
    branches: [agent/probe-main-v06-status]
    paths:
      - ".github/workflows/diagnose-main-v06.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-main-v06.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Fetch exact main run and failed job logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MAIN_SHA: 2b974409af2af867a4f80ae3f5780aae133026fe
        run: |
          set -euo pipefail
          mkdir -p /tmp/oyen-main-diagnostic
          python - <<'PY' 2>&1 | tee /tmp/oyen-main-diagnostic/diagnostic.log
          import json, os, urllib.request, urllib.error

          repo = os.environ['REPO']
          sha = os.environ['MAIN_SHA']
          token = os.environ['GH_TOKEN']

          def request(url, accept='application/vnd.github+json'):
              req = urllib.request.Request(url, headers={
                  'Accept': accept,
                  'Authorization': f'Bearer {token}',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'oyen-main-diagnostic',
              })
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      return response.status, response.read()
              except urllib.error.HTTPError as exc:
                  return exc.code, exc.read()

          code, raw = request(f'https://api.github.com/repos/{repo}/actions/runs?head_sha={sha}&per_page=50')
          print('RUNS_HTTP', code)
          payload = json.loads(raw.decode('utf-8'))
          runs = payload.get('workflow_runs', [])
          print('RUNS', json.dumps([{k:r.get(k) for k in ('id','name','status','conclusion','run_number','html_url')} for r in runs], ensure_ascii=False))

          for run in runs:
              run_id = run['id']
              code, raw = request(f'https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100')
              jobs = json.loads(raw.decode('utf-8')).get('jobs', [])
              print('JOBS', run_id, json.dumps([{k:j.get(k) for k in ('id','name','status','conclusion')} for j in jobs], ensure_ascii=False))
              for job in jobs:
                  if job.get('conclusion') not in ('failure','cancelled','timed_out'):
                      continue
                  code, log_raw = request(
                      f'https://api.github.com/repos/{repo}/actions/jobs/{job["id"]}/logs',
                      accept='application/vnd.github+json',
                  )
                  path = f'/tmp/oyen-main-diagnostic/job-{job["id"]}.log'
                  open(path, 'wb').write(log_raw)
                  text = log_raw.decode('utf-8', errors='replace')
                  print(f'FAILED_JOB_LOG id={job["id"]} http={code} bytes={len(log_raw)}')
                  print(text[-24000:])
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oyen-main-v06-diagnostic
          path: /tmp/oyen-main-diagnostic
          retention-days: 1
          if-no-files-found: error
