name: Diagnose Oyen V0.6 Live Render

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/validate-oyen-v02.yml"
  push:
    branches: [agent/probe-main-v06-status]
    paths:
      - ".github/workflows/validate-oyen-v02.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-live:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --quiet gradio_client
      - name: Call live ZeroGPU endpoint and capture exact exception
        continue-on-error: true
        run: |
          python - <<'PY' 2>&1 | tee /tmp/oyen-live-zero-error.log
          import json
          import traceback
          import urllib.request
          from gradio_client import Client

          base = "https://lako123-belajarh-ani.hf.space"
          try:
              with urllib.request.urlopen(base + "/config", timeout=30) as response:
                  config = json.loads(response.read().decode("utf-8"))
                  print("CONFIG_OK", response.status, len(json.dumps(config)))
              print("API_NAMES", [item.get("api_name") for item in config.get("dependencies", [])])
          except Exception:
              print("CONFIG_FAILURE")
              traceback.print_exc()

          try:
              client = Client(base, verbose=True)
              result = client.predict(
                  "Oyen berjalan ke kanan, menoleh ke kamera, melambaikan tangan, lalu tersenyum dan mengibaskan ekornya.",
                  "2D Cutout Blender",
                  "Oyen Purba Brand Sheet",
                  3,
                  "9:16",
                  12,
                  "360p cepat",
                  False,
                  api_name="/render_mp4",
              )
              print("LIVE_RESULT_TYPE", type(result).__name__)
              print("LIVE_RESULT", repr(result)[:30000])
          except Exception:
              print("LIVE_RENDER_EXCEPTION")
              traceback.print_exc()
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oyen-v06-live-zero-error
          path: /tmp/oyen-live-zero-error.log
          retention-days: 1
          if-no-files-found: error
