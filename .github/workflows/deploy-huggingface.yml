name: Deploy and Verify Oyen Purba Rig

on:
  push:
    branches:
      - main
    paths:
      - "hf_space/**"
      - ".github/workflows/deploy-huggingface.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: oyen-huggingface-deploy
  cancel-in-progress: true

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Mark deployment pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"huggingface-space/deploy","description":"Deploying and rendering Oyen Purba Rig V0.4"}'

      - uses: actions/checkout@v4

      - name: Sync Oyen Purba app to Hugging Face
        id: deploy
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          {
            set -euo pipefail
            test -n "$HF_TOKEN" || { echo "HF_TOKEN secret is missing"; exit 1; }
            test -f hf_space/app_v04.py || { echo "hf_space/app_v04.py is missing"; exit 1; }
            test -f hf_space/README.md || { echo "hf_space/README.md is missing"; exit 1; }
            test -f hf_space/requirements.txt || { echo "hf_space/requirements.txt is missing"; exit 1; }
            test -f hf_space/packages.txt || { echo "hf_space/packages.txt is missing"; exit 1; }
            grep -q '^app_file: app_v04.py$' hf_space/README.md
            grep -qx 'blender' hf_space/packages.txt
            grep -qx 'libegl1' hf_space/packages.txt

            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git lfs install

            rm -rf /tmp/oyen-hf-space
            git clone "https://lako123:${HF_TOKEN}@huggingface.co/spaces/lako123/Belajarh-ani" /tmp/oyen-hf-space
            rsync -av --delete --exclude='.git/' hf_space/ /tmp/oyen-hf-space/

            cd /tmp/oyen-hf-space
            git status --short
            git add -A
            if git diff --cached --quiet; then
              echo "Hugging Face Space is already up to date."
            else
              git commit -m "Deploy Oyen Purba Rig V0.4 from GitHub ${GITHUB_SHA::7}"
              git push origin HEAD:main
            fi
          } 2>&1 | tee /tmp/oyen-deploy.log

      - name: Wait for Oyen Purba V0.4 render API
        id: health
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            for attempt in $(seq 1 100); do
              code=$(curl --silent --location --max-time 20 \
                --output /tmp/space-config.json \
                --write-out "%{http_code}" \
                "https://lako123-belajarh-ani.hf.space/config" || true)

              if [ "$code" = "200" ] \
                && grep -q 'render_mp4' /tmp/space-config.json \
                && grep -q 'Oyen Purba Official' /tmp/space-config.json; then
                echo "Oyen Purba V0.4 /render_mp4 API is ready."
                exit 0
              fi
              echo "Attempt ${attempt}/100: waiting for the V0.4 UI (HTTP ${code})."
              sleep 15
            done
            echo "The Oyen Purba V0.4 Space did not become healthy."
            exit 1
          } 2>&1 | tee /tmp/oyen-health.log

      - name: Set up Python
        if: steps.health.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render and validate real rigged outputs
        id: smoke
        if: steps.health.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python -m pip install --quiet "gradio_client==1.13.3"
            python - <<'PY'
          from __future__ import annotations

          import shutil
          from pathlib import Path
          from typing import Any, Iterable

          from gradio_client import Client


          def walk(value: Any) -> Iterable[str]:
              if value is None:
                  return
              if isinstance(value, (str, Path)):
                  yield str(value)
                  return
              if isinstance(value, dict):
                  for item in value.values():
                      yield from walk(item)
                  return
              if isinstance(value, (list, tuple)):
                  for item in value:
                      yield from walk(item)
                  return
              path = getattr(value, "path", None)
              if path:
                  yield str(path)


          client = Client("https://lako123-belajarh-ani.hf.space", verbose=True)
          result = client.predict(
              "Oyen berjalan dua langkah, menoleh ke kamera, lalu melambaikan tangan dan mengibaskan ekornya.",
              "3D Blender",
              "Oyen Purba Official",
              3,
              "9:16",
              12,
              "360p cepat",
              False,
              api_name="/render_mp4",
          )
          print("SMOKE_RESULT:", result)

          status = str(result[0]) if isinstance(result, (list, tuple)) and result else ""
          if "Oyen Purba 3D Rig V1 selesai" not in status or "Armature terverifikasi" not in status:
              raise RuntimeError(f"The Space did not report a verified Oyen armature: {status}")

          paths = [Path(raw) for raw in walk(result)]
          videos = [path for path in paths if path.suffix.lower() == ".mp4" and path.is_file()]
          blends = [path for path in paths if path.suffix.lower() == ".blend" and path.is_file()]
          if not videos:
              raise RuntimeError("The Space returned no downloadable MP4")
          if not blends:
              raise RuntimeError("The Space returned no downloadable rigged .blend")

          video = max(videos, key=lambda item: item.stat().st_size)
          blend = max(blends, key=lambda item: item.stat().st_size)
          if video.stat().st_size < 1024:
              raise RuntimeError(f"MP4 is too small: {video.stat().st_size} bytes")
          if blend.stat().st_size < 4096:
              raise RuntimeError(f"Blend file is too small: {blend.stat().st_size} bytes")

          video_target = Path("/tmp/oyen-purba-verified.mp4")
          blend_target = Path("/tmp/oyen-purba-rig-verified.blend")
          shutil.copy2(video, video_target)
          shutil.copy2(blend, blend_target)
          print(
              "OYEN_PURBA_RIG_VERIFIED "
              f"mp4_bytes={video_target.stat().st_size} blend_bytes={blend_target.stat().st_size}"
          )
          PY
          } 2>&1 | tee /tmp/oyen-smoke.log

      - name: Upload verified Oyen outputs
        if: steps.smoke.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: oyen-purba-rig-v04-verified
          path: |
            /tmp/oyen-purba-verified.mp4
            /tmp/oyen-purba-rig-verified.blend
          retention-days: 3
          if-no-files-found: error

      - name: Publish diagnostics
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          {
            echo "# Oyen Purba Rig V0.4 deployment diagnostics"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Deploy: \`${DEPLOY_OUTCOME}\`"
            echo "- Health: \`${HEALTH_OUTCOME}\`"
            echo "- Rigged MP4 smoke test: \`${SMOKE_OUTCOME}\`"
            echo
            for file in /tmp/oyen-deploy.log /tmp/oyen-health.log /tmp/oyen-smoke.log; do
              echo "## $(basename "$file")"
              echo '```text'
              if [ -f "$file" ]; then tail -c 18000 "$file"; else echo "Step did not run."; fi
              echo
              echo '```'
            done
          } > /tmp/latest.md

          rm -rf /tmp/diagnostics-repo
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/diagnostics-repo
          cd /tmp/diagnostics-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diagnostics-work
          git rm -rf .
          cp /tmp/latest.md latest.md
          git add latest.md
          git commit -m "diagnostics: ${GITHUB_SHA::7}"
          git push --force origin HEAD:diagnostics

      - name: Publish final status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$HEALTH_OUTCOME" = "success" ] && [ "$SMOKE_OUTCOME" = "success" ]; then
            state="success"
            description="Oyen Purba armature, blend and MP4 verified"
          else
            state="failure"
            description="Oyen Purba deploy or rigged render verification failed"
          fi
          payload=$(printf '{"state":"%s","context":"huggingface-space/deploy","description":"%s","target_url":"https://huggingface.co/spaces/lako123/Belajarh-ani"}' "$state" "$description")
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$payload"

      - name: Fail unless rigged outputs are verified
        if: steps.deploy.outcome != 'success' || steps.health.outcome != 'success' || steps.smoke.outcome != 'success'
        run: exit 1
