name: Debug Oyen 2D V0.6 Unit Validation

on:
  push:
    branches: [agent/oyen-2d-stages-1-7]
    paths:
      - ".github/workflows/debug-oyen-v06.yml"
      - "hf_space/oyen_2d_*.py"
      - "hf_space/oyen_2d_*.json"
      - "hf_space/oyen_2d_asset_parts/**"
      - "tests/test_oyen_2d*.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/debug-oyen-v06.yml"
      - "hf_space/oyen_2d_*.py"
      - "hf_space/oyen_2d_*.json"
      - "hf_space/oyen_2d_asset_parts/**"
      - "tests/test_oyen_2d*.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --quiet "pillow>=10,<12"
      - name: Run compact unit diagnostics
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          PYTHONPATH=hf_space python -m unittest discover -s tests -p 'test_oyen_2d*.py' -v 2>&1 | tee /tmp/oyen-v06-unit.log
      - name: Upload exact diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oyen-v06-unit-diagnostic
          path: /tmp/oyen-v06-unit.log
          retention-days: 1
          if-no-files-found: error
      - name: Print exact diagnostic tail
        if: always()
        run: tail -n 200 /tmp/oyen-v06-unit.log
      - name: Fail on test error
        if: steps.tests.outcome != 'success'
        run: exit 1
