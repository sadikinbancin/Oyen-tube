name: Validate Oyen Rig V1

on:
  push:
    branches:
      - agent/oyen-rig-v1
    paths:
      - "hf_space/**"
      - "tests/test_oyen_bridge.py"
      - ".github/workflows/validate-oyen-rig-v1.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark rig validation pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"oyen-rig-v1/validate","description":"Validating Oyen Purba armature"}'

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile and test rig generator
        id: test
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m py_compile hf_space/oyen_bridge.py hf_space/oyen_rig_v1.py hf_space/oyen_runtime.py tests/test_oyen_bridge.py
          python -m unittest discover -s tests -p 'test_oyen_bridge.py' -v
          python - <<'PY'
          import sys
          sys.path.insert(0, "hf_space")
          from oyen_bridge import build_blender_script

          job = {
              "job_id": "ci-rig",
              "timeline": {"fps": 12, "total_frames": 36, "duration_seconds": 3, "scenes": []},
              "render": {"width": 360, "height": 640, "aspect_ratio": "9:16", "preview_resolution_percentage": 100},
          }
          script = build_blender_script(job)
          compile(script, "oyen_blender_scene.py", "exec")
          required = [
              "Oyen_Purba_Rig",
              "upper_arm.L",
              "thigh.R",
              "tail.05",
              "Oyen_Arm_IK",
              "Oyen_Leg_IK",
              "OYEN_RIG_V1_SUCCESS",
          ]
          missing = [item for item in required if item not in script]
          if missing:
              raise SystemExit(f"Missing rig elements: {missing}")
          print(f"OYEN_RIG_SCRIPT_OK bytes={len(script)}")
          PY

      - name: Publish validation status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
        run: |
          if [ "$TEST_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Oyen Purba Rig V1 is valid"
          else
            STATE="failure"
            DESCRIPTION="Oyen Purba Rig V1 validation failed"
          fi
          PAYLOAD=$(printf '{"state":"%s","context":"oyen-rig-v1/validate","description":"%s"}' "$STATE" "$DESCRIPTION")
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$PAYLOAD"

      - name: Fail when rig validation failed
        if: steps.test.outcome != 'success'
        run: exit 1
