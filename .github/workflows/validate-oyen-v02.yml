name: Validate Oyen Purba 2D Stages 1-7

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/validate-oyen-v02.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  monitor-main:
    name: Query final main and live Space
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Query exact main workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: bff849231851e625e80d16d8b16b4bac4ebda930
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&per_page=30" \
            -o /tmp/runs.json
          python - <<'PY'
          import json
          data=json.load(open('/tmp/runs.json'))
          print('TOTAL_RUNS', data.get('total_count'))
          for run in data.get('workflow_runs', []):
              print('RUN', json.dumps({
                  'id': run.get('id'),
                  'name': run.get('name'),
                  'event': run.get('event'),
                  'status': run.get('status'),
                  'conclusion': run.get('conclusion'),
                  'created_at': run.get('created_at'),
                  'updated_at': run.get('updated_at'),
                  'html_url': run.get('html_url'),
              }, ensure_ascii=False))
          PY

      - name: Query live Hugging Face state
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            "https://huggingface.co/api/spaces/lako123/Belajarh-ani" \
            -o /tmp/space.json
          python - <<'PY'
          import json
          data=json.load(open('/tmp/space.json'))
          print('SPACE', json.dumps({k:data.get(k) for k in ['id','sha','lastModified','sdk','private','disabled','runtime']}, ensure_ascii=False, default=str))
          PY
          code=$(curl --silent --location --max-time 30 \
            --output /tmp/config.json --write-out '%{http_code}' \
            "https://lako123-belajarh-ani.hf.space/config" || true)
          echo "CONFIG_HTTP ${code}"
          python - <<'PY'
          from pathlib import Path
          p=Path('/tmp/config.json')
          text=p.read_text(errors='replace') if p.exists() else ''
          print('CONFIG_BYTES', len(text))
          print('HAS_RENDER_MP4', 'render_mp4' in text)
          print('HAS_V06_TITLE', 'Oyen Purba 2D Cutout Studio' in text)
          print('HAS_MOTION_2D', 'Susun Motion 2D' in text)
          print('HAS_CUTOUT_MODE', '2D Cutout Blender' in text)
          PY
