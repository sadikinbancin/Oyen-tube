name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "mcpb/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "mcpb/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
      - ".github/workflows/ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-package-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --group dev

      - name: Lint package source
        run: uv run ruff check src/

      - name: Run package tests
        run: uv run pytest tests/ -q

      - name: Verify package import
        run: uv run python -c "import blender_mcp; print('blender_mcp import ok')"
