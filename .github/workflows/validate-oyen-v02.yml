name: Validate Oyen Purba Rig V0.4

on:
  push:
    branches:
      - main
    paths:
      - "hf_space/**"
      - "tests/test_oyen_bridge.py"
      - "tests/test_oyen_runtime.py"
      - "docs/OYEN_PURBA_RIG_SPEC.md"
      - ".github/workflows/validate-oyen-v02.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: oyen-v04-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark validation pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"oyen-v04/validate","description":"Validating Oyen Purba 28-bone rig"}'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate rig generator and runtime
        id: validation
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m py_compile \
            hf_space/app.py \
            hf_space/oyen_bridge.py \
            hf_space/oyen_runtime.py \
            tests/test_oyen_bridge.py \
            tests/test_oyen_runtime.py
          python -m unittest discover -s tests -p 'test_oyen_*.py' -v
          grep -qx 'blender' hf_space/packages.txt
          grep -qx 'libegl1' hf_space/packages.txt
          grep -q 'OyenPurba_Rig' hf_space/oyen_bridge.py
          grep -q 'OYEN_RIG_READY' hf_space/oyen_bridge.py
          grep -q 'bone_count": RIG_BONE_COUNT' hf_space/app.py

      - name: Publish validation status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          set -euo pipefail
          if [ "$VALIDATION_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Oyen Purba 28-bone rig generator is valid"
          else
            STATE="failure"
            DESCRIPTION="Oyen Purba rig validation failed"
          fi
          PAYLOAD=$(printf '{"state":"%s","context":"oyen-v04/validate","description":"%s"}' "$STATE" "$DESCRIPTION")
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$PAYLOAD"

      - name: Fail workflow when validation failed
        if: steps.validation.outcome != 'success'
        run: exit 1
