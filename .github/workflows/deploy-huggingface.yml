name: Deploy and Verify Oyen MP4

on:
  push:
    branches:
      - main
    paths:
      - "hf_space/**"
      - ".github/workflows/deploy-huggingface.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: oyen-huggingface-deploy
  cancel-in-progress: true

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Mark deployment pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"huggingface-space/deploy","description":"Deploying Oyen and rendering a real MP4"}'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Gradio app to Hugging Face
        id: deploy
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$HF_TOKEN" || { echo "HF_TOKEN secret is missing"; exit 1; }
          test -f hf_space/app.py
          test -f hf_space/README.md
          test -f hf_space/requirements.txt
          test -f hf_space/packages.txt
          grep -qx "blender" hf_space/packages.txt
          grep -qx "libegl1" hf_space/packages.txt

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install

          rm -rf /tmp/oyen-hf-space
          git clone "https://lako123:${HF_TOKEN}@huggingface.co/spaces/lako123/Belajarh-ani" /tmp/oyen-hf-space
          rsync -av --delete --exclude=".git/" hf_space/ /tmp/oyen-hf-space/

          cd /tmp/oyen-hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "Hugging Face Space is already up to date."
          else
            git commit -m "Deploy Oyen from GitHub ${GITHUB_SHA::7}"
            git push origin HEAD:main
          fi

      - name: Wait for healthy render API
        id: health
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          for attempt in $(seq 1 100); do
            code=$(curl --silent --location --max-time 20 \
              --output /tmp/space-config.json \
              --write-out "%{http_code}" \
              "https://lako123-belajarh-ani.hf.space/config" || true)

            if [ "$code" = "200" ] && grep -q "render_mp4" /tmp/space-config.json; then
              echo "The Oyen render API is ready."
              exit 0
            fi

            echo "Attempt ${attempt}/100: build or startup still running (HTTP ${code})."
            sleep 15
          done
          echo "The Space did not become healthy."
          exit 1

      - name: Set up Python
        if: steps.health.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render and validate a real MP4
        id: smoke
        if: steps.health.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python -m pip install --quiet "gradio_client==1.13.3"
            python - <<'PY'
          from __future__ import annotations

          import shutil
          from pathlib import Path
          from typing import Any, Iterable

          from gradio_client import Client


          def walk(value: Any) -> Iterable[str]:
              if value is None:
                  return
              if isinstance(value, (str, Path)):
                  yield str(value)
                  return
              if isinstance(value, dict):
                  for item in value.values():
                      yield from walk(item)
                  return
              if isinstance(value, (list, tuple)):
                  for item in value:
                      yield from walk(item)
                  return
              path = getattr(value, "path", None)
              if path:
                  yield str(path)


          client = Client("https://lako123-belajarh-ani.hf.space", verbose=True)
          result = client.predict(
              "Oyen berjalan dua langkah, menoleh ke kamera, lalu mengibaskan ekornya.",
              "3D Blender",
              "Oyen Cartoon",
              3,
              "9:16",
              12,
              "360p cepat",
              False,
              api_name="/render_mp4",
          )
          print("SMOKE_RESULT:", result)

          candidates = []
          for raw in walk(result):
              path = Path(raw)
              if path.suffix.lower() == ".mp4" and path.is_file():
                  candidates.append(path)

          if not candidates:
              raise RuntimeError("The Space returned no downloadable MP4 file")

          video = max(candidates, key=lambda item: item.stat().st_size)
          if video.stat().st_size < 1024:
              raise RuntimeError(f"MP4 is too small: {video.stat().st_size} bytes")

          target = Path("/tmp/oyen-verified.mp4")
          shutil.copy2(video, target)
          print(f"OYEN_MP4_VERIFIED path={target} bytes={target.stat().st_size}")
          PY
          } 2>&1 | tee /tmp/oyen-smoke.log

      - name: Upload verified MP4
        if: steps.smoke.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: oyen-verified-mp4
          path: /tmp/oyen-verified.mp4
          retention-days: 3
          if-no-files-found: error

      - name: Publish diagnostics
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          set -euo pipefail
          {
            echo "# Oyen MP4 deployment diagnostics"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Deploy: \`${DEPLOY_OUTCOME}\`"
            echo "- Health: \`${HEALTH_OUTCOME}\`"
            echo "- Smoke MP4: \`${SMOKE_OUTCOME}\`"
            echo
            echo '```text'
            if [ -f /tmp/oyen-smoke.log ]; then
              tail -c 16000 /tmp/oyen-smoke.log
            else
              echo "Smoke test did not run."
            fi
            echo
            echo '```'
          } > /tmp/latest.md

          rm -rf /tmp/diagnostics-repo
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/diagnostics-repo
          cd /tmp/diagnostics-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diagnostics-work
          git rm -rf .
          cp /tmp/latest.md latest.md
          git add latest.md
          git commit -m "diagnostics: ${GITHUB_SHA::7}"
          git push --force origin HEAD:diagnostics

      - name: Publish final status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          set -euo pipefail
          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$HEALTH_OUTCOME" = "success" ] && [ "$SMOKE_OUTCOME" = "success" ]; then
            state="success"
            description="Oyen deployed and produced a verified MP4"
          else
            state="failure"
            description="Deploy, health check, or MP4 render failed"
          fi

          payload=$(printf '{"state":"%s","context":"huggingface-space/deploy","description":"%s","target_url":"https://huggingface.co/spaces/lako123/Belajarh-ani"}' "$state" "$description")
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$payload"

      - name: Fail unless MP4 is verified
        if: steps.deploy.outcome != 'success' || steps.health.outcome != 'success' || steps.smoke.outcome != 'success'
        run: exit 1
