name: Validate Oyen V0.3 MP4

on:
  push:
    branches:
      - main
    paths:
      - "hf_space/**"
      - "tests/**"
      - ".github/workflows/validate-oyen-v02.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: oyen-v03-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Mark validation pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"oyen-v03/validate","description":"Testing direct Blender MP4 render"}'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Blender and FFmpeg
        id: dependencies
        continue-on-error: true
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y blender ffmpeg
          blender --version
          ffmpeg -version | head -n 1

      - name: Validate Python and render MP4
        id: validation
        if: steps.dependencies.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m py_compile \
            hf_space/app.py \
            hf_space/oyen_bridge.py \
            hf_space/direct_renderer.py \
            tests/test_oyen_bridge.py \
            tests/test_direct_renderer.py \
            tests/smoke_direct_render.py
          python -m unittest discover -s tests -p 'test_*.py' -v
          PYTHONPATH=hf_space python tests/smoke_direct_render.py

      - name: Publish validation status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPENDENCY_OUTCOME: ${{ steps.dependencies.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          set -euo pipefail

          if [ "$DEPENDENCY_OUTCOME" = "success" ] && [ "$VALIDATION_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Direct Blender MP4 smoke render passed"
          else
            STATE="failure"
            DESCRIPTION="Oyen V0.3 MP4 validation failed"
          fi

          PAYLOAD=$(printf '{"state":"%s","context":"oyen-v03/validate","description":"%s"}' "$STATE" "$DESCRIPTION")

          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$PAYLOAD"

      - name: Fail workflow when validation failed
        if: steps.dependencies.outcome != 'success' || steps.validation.outcome != 'success'
        run: exit 1
