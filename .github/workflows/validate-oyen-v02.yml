name: Validate Oyen Purba V0.4

on:
  push:
    branches:
      - main
      - agent/oyen-purba-v04-final
    paths:
      - "hf_space/**"
      - "tests/test_oyen_bridge.py"
      - "tests/test_oyen_runtime.py"
      - ".github/workflows/validate-oyen-v02.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: oyen-v04-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark validation pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"oyen-v04/validate","description":"Validating Oyen Purba app and armature runtime"}'

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate app, rig generator and runtime
        id: validation
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python -m py_compile \
              hf_space/app.py \
              hf_space/app_v04.py \
              hf_space/oyen_bridge.py \
              hf_space/oyen_rig_v1.py \
              hf_space/oyen_runtime.py \
              tests/test_oyen_bridge.py \
              tests/test_oyen_runtime.py
            python -m unittest discover -s tests -p 'test_oyen_*.py' -v
            grep -qx 'blender' hf_space/packages.txt
            grep -qx 'libegl1' hf_space/packages.txt
            grep -q 'app_file: app_v04.py' hf_space/README.md
            grep -q 'OYEN_RIG_BONES count=' hf_space/rig_parts/oyen_rig_v1_05.txt
            python - <<'PY'
          import sys
          sys.path.insert(0, "hf_space")
          from oyen_bridge import build_blender_script

          job = {
              "job_id": "v04-ci",
              "project": {"prompt": "Oyen walks and waves"},
              "timeline": {"fps": 12, "total_frames": 36, "duration_seconds": 3, "scenes": []},
              "render": {
                  "width": 360,
                  "height": 640,
                  "aspect_ratio": "9:16",
                  "preview_resolution_percentage": 100,
              },
          }
          script = build_blender_script(job)
          compile(script, "oyen_blender_scene.py", "exec")
          required = [
              "Oyen_Purba_Rig",
              'bone(f"upper_arm.{side}"',
              'bone(f"foot_ik.{side}"',
              'name = f"tail.{index:02d}"',
              "Oyen_Arm_IK",
              "Oyen_Leg_IK",
              "OYEN_RIG_V1_SUCCESS",
              "OYEN_RIG_BONES count=",
          ]
          missing = [item for item in required if item not in script]
          if missing:
              raise SystemExit(f"Missing Oyen Rig V0.4 elements: {missing}")
          print(f"OYEN_V04_SCRIPT_OK bytes={len(script)}")
          PY
          } 2>&1 | tee /tmp/oyen-v04-validation.log

      - name: Publish validation diagnostics
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          {
            echo "# Oyen Purba V0.4 validation diagnostics"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Outcome: \`${VALIDATION_OUTCOME}\`"
            echo
            echo '```text'
            tail -c 18000 /tmp/oyen-v04-validation.log 2>/dev/null || echo "No validation log."
            echo
            echo '```'
          } > /tmp/latest-v04.md

          rm -rf /tmp/v04-diagnostics
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/v04-diagnostics
          cd /tmp/v04-diagnostics
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diagnostics-work
          git rm -rf .
          cp /tmp/latest-v04.md latest.md
          git add latest.md
          git commit -m "v04 diagnostics: ${GITHUB_SHA::7}"
          git push --force origin HEAD:v04-diagnostics

      - name: Publish validation status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          if [ "$VALIDATION_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Oyen Purba V0.4 app and armature runtime are valid"
          else
            STATE="failure"
            DESCRIPTION="Oyen Purba V0.4 validation failed"
          fi
          PAYLOAD=$(printf '{"state":"%s","context":"oyen-v04/validate","description":"%s"}' "$STATE" "$DESCRIPTION")
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$PAYLOAD"

      - name: Fail workflow when validation failed
        if: steps.validation.outcome != 'success'
        run: exit 1
