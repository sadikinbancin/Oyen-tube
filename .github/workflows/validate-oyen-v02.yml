name: Diagnose live Oyen ZeroGPU render

on:
  push:
    branches: [diag/oyen-v06-live-render]
    paths:
      - ".github/workflows/validate-oyen-v02.yml"
      - "tests/test_oyen_2d_live_call_probe.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/validate-oyen-v02.yml"
      - "tests/test_oyen_2d_live_call_probe.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install diagnostic clients
        run: python -m pip install --quiet "huggingface_hub>=1.1,<2" gradio_client

      - name: Call live endpoint and capture response
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          PYTHONPATH=hf_space python -m unittest tests.test_oyen_2d_live_call_probe -v 2>&1 | tee /tmp/oyen-live-call.log

      - name: Fetch exact Hugging Face Space run logs
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY' 2>&1 | tee /tmp/oyen-space-log-fetch.log
          import os
          from pathlib import Path
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "")
          if not token:
              raise RuntimeError("HF_TOKEN missing")
          api = HfApi(token=token)
          runtime = api.get_space_runtime(repo_id="lako123/Belajarh-ani")
          Path("/tmp/oyen-space-runtime.txt").write_text(
              f"stage={runtime.stage} hardware={runtime.hardware} requested={runtime.requested_hardware}\n{runtime.raw}\n",
              encoding="utf-8",
          )
          lines = list(api.fetch_space_logs(repo_id="lako123/Belajarh-ani", follow=False))
          Path("/tmp/oyen-space-run.log").write_text("".join(lines), encoding="utf-8", errors="replace")
          print(f"SPACE_LOG_LINES={len(lines)}")
          print("".join(lines[-240:]))
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oyen-v06-live-zero-error
          path: |
            /tmp/oyen-live-call.log
            /tmp/oyen-space-run.log
            /tmp/oyen-space-runtime.txt
            /tmp/oyen-space-log-fetch.log
          retention-days: 1
          if-no-files-found: warn
