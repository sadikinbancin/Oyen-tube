name: Deploy and Verify Oyen Purba 2D V0.6

on:
  push:
    branches:
      - main
    paths:
      - "hf_space/**"
      - ".github/workflows/deploy-huggingface.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: oyen-huggingface-deploy
  cancel-in-progress: true

jobs:
  deploy-and-test:
    name: Deploy and live-render Oyen 2D
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d '{"state":"pending","context":"huggingface-space/deploy","description":"Deploying and live-rendering Oyen Purba 2D V0.6"}'

      - name: Validate deployment source
        run: |
          test -f hf_space/app_v04.py
          test -f hf_space/oyen_2d_asset_bundle.py
          test -f hf_space/oyen_2d_builder.py
          test -f hf_space/oyen_2d_director.py
          test -f hf_space/oyen_2d_runtime.py
          test -f hf_space/oyen_2d_stage_audit.json
          test "$(find hf_space/oyen_2d_asset_parts -name '*.b64' | wc -l)" -eq 12
          grep -q '^APP_VERSION = "0.6.0"' hf_space/app_v04.py
          grep -q '^app_file: app_v04.py$' hf_space/README.md
          grep -q 'Oyen Purba 2D Cutout Studio' hf_space/README.md
          grep -qx 'blender' hf_space/packages.txt

      - name: Sync GitHub source to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$HF_TOKEN"
          rm -rf /tmp/oyen-hf-space
          git clone "https://lako123:${HF_TOKEN}@huggingface.co/spaces/lako123/Belajarh-ani" /tmp/oyen-hf-space
          rsync --archive --delete --exclude '.git' hf_space/ /tmp/oyen-hf-space/
          cd /tmp/oyen-hf-space
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Hugging Face Space already matches GitHub."
          else
            git commit -m "Deploy Oyen Purba 2D V0.6 from GitHub ${GITHUB_SHA::7}"
            git push origin HEAD:main
          fi

      - name: Wait for the actual V0.6 application
        run: |
          set -euo pipefail
          for attempt in $(seq 1 160); do
            code=$(curl --silent --location --max-time 20 \
              --output /tmp/space-config.json \
              --write-out "%{http_code}" \
              "https://lako123-belajarh-ani.hf.space/config" || true)
            if [ "$code" = "200" ] \
              && grep -q 'render_mp4' /tmp/space-config.json \
              && grep -q 'Oyen Purba 2D Cutout Studio' /tmp/space-config.json \
              && grep -q 'Susun Motion 2D' /tmp/space-config.json \
              && grep -q '2D Cutout Blender' /tmp/space-config.json; then
              echo "Oyen Purba 2D V0.6 live API is ready."
              exit 0
            fi
            echo "Attempt ${attempt}/160: waiting for V0.6 (HTTP ${code})."
            sleep 15
          done
          echo "The live V0.6 application did not become ready."
          tail -c 12000 /tmp/space-config.json 2>/dev/null || true
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install live smoke-test client
        run: python -m pip install --quiet gradio_client "pillow>=10,<12"

      - name: Render and verify live Oyen 2D stages 1-7
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import shutil
          from pathlib import Path
          from typing import Any, Iterable

          from gradio_client import Client
          from PIL import Image, ImageStat

          def walk(value: Any) -> Iterable[Path]:
              if value is None:
                  return
              if isinstance(value, (str, Path)):
                  path = Path(value)
                  if path.is_file():
                      yield path
                  return
              if isinstance(value, dict):
                  for item in value.values():
                      yield from walk(item)
                  return
              if isinstance(value, (list, tuple)):
                  for item in value:
                      yield from walk(item)

          prompt = (
              "Oyen berjalan ke kanan, menoleh ke kamera, melambaikan tangan, "
              "lalu tersenyum dan mengibaskan ekornya."
          )
          client = Client("https://lako123-belajarh-ani.hf.space", verbose=True)
          result = client.predict(
              prompt,
              "2D Cutout Blender",
              "Oyen Purba Brand Sheet",
              3,
              "9:16",
              12,
              "360p cepat",
              False,
              api_name="/render_mp4",
          )
          print("LIVE_SMOKE_RESULT:", result)
          if not isinstance(result, (list, tuple)) or len(result) < 8:
              raise RuntimeError(f"Unexpected Gradio result: {result}")
          status = str(result[0])
          if "Oyen Purba 2D V1 selesai — Tahap 1–7 terverifikasi" not in status:
              raise RuntimeError(f"Live render did not report success: {status}")
          job = json.loads(str(result[3]))
          if job.get("schema_version") != "oyen.animation-job.v6":
              raise RuntimeError(f"Wrong job schema: {job.get('schema_version')}")
          if job.get("app_version") != "0.6.0":
              raise RuntimeError(f"Wrong app version: {job.get('app_version')}")
          stages = job["stage_audit"]["stages"]
          if len(stages) != 7 or not all(item["status"] == "implemented" for item in stages.values()):
              raise RuntimeError("Stage 1-7 audit is incomplete")
          character = job["project"]["main_character"]
          if character["active_rig_layers"] < 35:
              raise RuntimeError(f"Too few active layers: {character}")
          if character["bone_count"] < 25 or character["action_count"] != 7:
              raise RuntimeError(f"Invalid rig/action counts: {character}")
          actions = [clip["action"] for clip in job["motion_plan"]["clips"]]
          for required in (
              "OYEN_WALK_IN_PLACE",
              "OYEN_HEAD_TURN",
              "OYEN_WAVE",
              "OYEN_TAIL_WAG",
          ):
              if required not in actions:
                  raise RuntimeError(f"Motion Director missed {required}: {actions}")

          paths = list(walk(result))
          videos = [path for path in paths if path.suffix.lower() == ".mp4"]
          blends = [path for path in paths if path.suffix.lower() == ".blend"]
          sheets = [path for path in paths if path.suffix.lower() in {".jpg", ".jpeg"}]
          logs = [path for path in paths if path.suffix.lower() == ".log"]
          if not videos or not blends or not sheets or not logs:
              raise RuntimeError(f"Missing live outputs: {paths}")
          video = max(videos, key=lambda path: path.stat().st_size)
          blend = max(blends, key=lambda path: path.stat().st_size)
          sheet = max(sheets, key=lambda path: path.stat().st_size)
          log = max(logs, key=lambda path: path.stat().st_size)
          if video.stat().st_size < 2048:
              raise RuntimeError("Live MP4 is too small")
          if blend.stat().st_size < 10000:
              raise RuntimeError("Live .blend is too small")
          if sheet.stat().st_size < 2000:
              raise RuntimeError("Live contact sheet is too small")
          image = Image.open(sheet).convert("RGB")
          if max(ImageStat.Stat(image).var) < 35:
              raise RuntimeError("Live contact sheet appears blank")
          log_text = log.read_text(encoding="utf-8", errors="replace")
          for marker in (
              "OYEN_2D_ASSETS count=",
              "OYEN_2D_BONES count=",
              "OYEN_2D_ACTIONS count=7",
              "OYEN_2D_NLA strips=",
              "OYEN_2D_QA frames=5",
              "OYEN_2D_LIBRARY_ONLY true",
              "OYEN_2D_RENDER_SUCCESS",
          ):
              if marker not in log_text:
                  raise RuntimeError(f"Missing Blender proof marker: {marker}")

          targets = {
              "/tmp/oyen-purba-2d-v06.mp4": video,
              "/tmp/oyen-purba-2d-v06.blend": blend,
              "/tmp/oyen-purba-2d-v06-contact-sheet.jpg": sheet,
              "/tmp/oyen-purba-2d-v06.log": log,
          }
          for target, source in targets.items():
              shutil.copy2(source, target)
          print(
              "OYEN_2D_V06_LIVE_RENDER_SUCCESS "
              f"layers={character['active_rig_layers']} bones={character['bone_count']} "
              f"actions={actions} mp4={video.stat().st_size} "
              f"blend={blend.stat().st_size} sheet={sheet.stat().st_size}"
          )
          PY

      - name: Upload verified live outputs
        uses: actions/upload-artifact@v4
        with:
          name: oyen-purba-2d-v06-live-verified
          path: |
            /tmp/oyen-purba-2d-v06.mp4
            /tmp/oyen-purba-2d-v06.blend
            /tmp/oyen-purba-2d-v06-contact-sheet.jpg
            /tmp/oyen-purba-2d-v06.log
          retention-days: 3
          if-no-files-found: error

      - name: Publish successful deployment status
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d '{"state":"success","context":"huggingface-space/deploy","description":"Oyen 2D stages 1-7 live render, blend and MP4 verified","target_url":"https://huggingface.co/spaces/lako123/Belajarh-ani"}'

      - name: Publish failed deployment status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d '{"state":"failure","context":"huggingface-space/deploy","description":"Oyen 2D V0.6 deployment or live render verification failed","target_url":"https://huggingface.co/spaces/lako123/Belajarh-ani"}'
