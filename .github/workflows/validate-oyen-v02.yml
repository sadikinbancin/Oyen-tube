name: Validate Oyen Motion AI V0.5

on:
  push:
    branches:
      - main
      - agent/oyen-motion-ai-v05
    paths:
      - "hf_space/**"
      - "tests/test_oyen_*.py"
      - ".github/workflows/validate-oyen-v02.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: oyen-v05-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark validation pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"oyen-v05/validate","description":"Validating Motion AI, forward axis and rig runtime"}'

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Motion AI app, planner, rig and runtime
        id: validation
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python -m py_compile \
              hf_space/app.py \
              hf_space/app_v04.py \
              hf_space/oyen_motion_ai.py \
              hf_space/oyen_bridge.py \
              hf_space/oyen_rig_v1.py \
              hf_space/oyen_runtime.py \
              tests/test_oyen_bridge.py \
              tests/test_oyen_motion_ai.py \
              tests/test_oyen_runtime.py
            python -m unittest discover -s tests -p 'test_oyen_*.py' -v
            grep -qx 'blender' hf_space/packages.txt
            grep -qx 'libegl1' hf_space/packages.txt
            grep -q 'app_file: app_v04.py' hf_space/README.md
            grep -q 'OYEN_RIG_BONES count=' hf_space/rig_parts/oyen_rig_v1_05.txt
            python - <<'PY'
          import sys
          sys.path.insert(0, "hf_space")
          from oyen_bridge import build_blender_script
          from oyen_motion_ai import build_motion_plan

          plan, provider, note = build_motion_plan(
              "Oyen berlari mengejar ayam, berhenti, lalu menoleh ke kamera dengan kesal.",
              5,
          )
          assert plan["coordinate_system"]["character_forward"] == "-Y"
          assert plan["clips"][0]["type"] == "run"
          assert plan["clips"][0]["direction"] == "forward"
          assert "wave" not in [clip["type"] for clip in plan["clips"]]

          job = {
              "job_id": "v05-ci",
              "project": {"prompt": "Oyen runs forward"},
              "motion_plan": plan,
              "timeline": {"fps": 12, "total_frames": 60, "duration_seconds": 5},
              "render": {
                  "width": 360,
                  "height": 640,
                  "aspect_ratio": "9:16",
                  "preview_resolution_percentage": 100,
              },
          }
          script = build_blender_script(job)
          compile(script, "oyen_blender_scene.py", "exec")
          required = [
              "Oyen_Purba_Rig",
              'bone(f"upper_arm.{side}"',
              'bone(f"foot_ik.{side}"',
              'name = f"tail.{index:02d}"',
              "Oyen_Arm_IK",
              "Oyen_Leg_IK",
              '"forward": (0.0, -1.0)',
              "direction_vector",
              "key_locomotion",
              "key_jump",
              "key_angry",
              "Oyen_AI_Motion_Plan.json",
              "OYEN_MOTION_PLAN_EMBEDDED",
              "OYEN_MOTION_AI_SUCCESS",
              "OYEN_RIG_V1_SUCCESS",
              "OYEN_RIG_BONES count=",
          ]
          missing = [item for item in required if item not in script]
          if missing:
              raise SystemExit(f"Missing Oyen Motion AI V0.5 elements: {missing}")
          print(
              f"OYEN_V05_SCRIPT_OK bytes={len(script)} provider={provider} "
              f"clips={[clip['type'] for clip in plan['clips']]} note={note}"
          )
          PY
          } 2>&1 | tee /tmp/oyen-v05-validation.log

      - name: Publish validation diagnostics
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          {
            echo "# Oyen Motion AI V0.5 validation diagnostics"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Outcome: \`${VALIDATION_OUTCOME}\`"
            echo
            echo '```text'
            tail -c 20000 /tmp/oyen-v05-validation.log 2>/dev/null || echo "No validation log."
            echo
            echo '```'
          } > /tmp/latest-v05.md

          rm -rf /tmp/v05-diagnostics
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/v05-diagnostics
          cd /tmp/v05-diagnostics
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diagnostics-work
          git rm -rf .
          cp /tmp/latest-v05.md latest.md
          git add latest.md
          git commit -m "v05 diagnostics: ${GITHUB_SHA::7}"
          git push --force origin HEAD:v05-diagnostics

      - name: Publish validation status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: |
          if [ "$VALIDATION_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Oyen Motion AI V0.5 planner and rig are valid"
          else
            STATE="failure"
            DESCRIPTION="Oyen Motion AI V0.5 validation failed"
          fi
          PAYLOAD=$(printf '{"state":"%s","context":"oyen-v05/validate","description":"%s"}' "$STATE" "$DESCRIPTION")
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$PAYLOAD"

      - name: Fail workflow when validation failed
        if: steps.validation.outcome != 'success'
        run: exit 1
