name: Debug Oyen 2D Blender Render

on:
  push:
    branches: [agent/oyen-2d-stages-1-7]
    paths: [".github/workflows/debug-oyen-blender.yml"]
  pull_request:
    branches: [main]
    paths: [".github/workflows/debug-oyen-blender.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --quiet "pillow>=10,<12"
          sudo apt-get update -qq >/tmp/apt.log 2>&1
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq blender ffmpeg libegl1 >>/tmp/apt.log 2>&1
      - name: Run exact Blender diagnostic render
        id: render
        continue-on-error: true
        run: |
          set -o pipefail
          PYTHONPATH=hf_space python - <<'PY' 2>&1 | tee /tmp/oyen-debug-console.log
          import json
          from pathlib import Path
          from oyen_2d_director import build_2d_motion_plan, compile_nla_timeline
          from oyen_2d_runtime import render_2d_job
          audit = json.loads(Path('hf_space/oyen_2d_stage_audit.json').read_text())
          plan = build_2d_motion_plan(
              'Oyen berjalan ke kanan, menoleh ke kamera, melambaikan tangan, lalu tersenyum dan mengibaskan ekornya.',
              3,
              12,
          )
          result = render_2d_job({
              'job_id': 'debug-blender-v06',
              'motion_plan': plan,
              'compiled_timeline': compile_nla_timeline(plan),
              'stage_audit': audit,
              'render': {'width': 360, 'height': 640, 'aspect_ratio': '9:16'},
          }, '/tmp/oyen-v06-debug', timeout=300)
          print(result)
          PY
      - name: Collect diagnostic files
        if: always()
        run: |
          mkdir -p /tmp/oyen-debug-artifact
          cp /tmp/oyen-debug-console.log /tmp/oyen-debug-artifact/ 2>/dev/null || true
          cp /tmp/apt.log /tmp/oyen-debug-artifact/ 2>/dev/null || true
          find /tmp/oyen-v06-debug -type f -maxdepth 5 -exec cp --parents {} /tmp/oyen-debug-artifact/ \; 2>/dev/null || true
          find /tmp/oyen-debug-artifact -type f -maxdepth 8 -print
      - name: Upload exact Blender diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oyen-v06-blender-diagnostic
          path: /tmp/oyen-debug-artifact
          retention-days: 1
          if-no-files-found: error
      - name: Fail on render error
        if: steps.render.outcome != 'success'
        run: exit 1
