name: Repair Oyen 2D Asset Archive

on:
  push:
    branches: [agent/oyen-2d-stages-1-7]
    paths:
      - ".github/workflows/repair-oyen-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/oyen-2d-stages-1-7
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --quiet "pillow>=10,<12"

      - name: Rebuild a clean deterministic ZIP from committed local records
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          import binascii
          import hashlib
          import io
          import json
          import re
          import struct
          import zipfile
          import zlib
          from pathlib import Path

          from PIL import Image, ImageFile, ImageOps

          part_dir = Path("hf_space/oyen_2d_asset_parts")
          part_paths = sorted(part_dir.glob("oyen_2d_assets.part*.b64"))
          if len(part_paths) != 12:
              raise RuntimeError(f"Expected 12 asset parts, found {len(part_paths)}")
          encoded = "".join(path.read_text(encoding="ascii").strip() for path in part_paths)
          raw = base64.b64decode(encoded, validate=True)

          entries: dict[str, bytes] = {}
          issues: dict[str, dict[str, object]] = {}
          position = 0
          while True:
              local_position = raw.find(b"PK\x03\x04", position)
              central_position = raw.find(b"PK\x01\x02", position)
              if local_position < 0 or (
                  central_position >= 0 and central_position < local_position
              ):
                  break
              position = local_position
              (
                  _signature,
                  _version,
                  flags,
                  compression,
                  _mod_time,
                  _mod_date,
                  expected_crc,
                  compressed_size,
                  uncompressed_size,
                  name_length,
                  extra_length,
              ) = struct.unpack_from("<IHHHHHIIIHH", raw, position)
              if flags & 0x08:
                  raise RuntimeError("Data-descriptor ZIP entries are not supported")
              name_start = position + 30
              name_end = name_start + name_length
              name = raw[name_start:name_end].decode("utf-8")
              data_start = name_end + extra_length
              next_local = raw.find(b"PK\x03\x04", data_start)
              next_central = raw.find(b"PK\x01\x02", data_start)
              candidates = [value for value in (next_local, next_central) if value >= 0]
              actual_end = min(candidates) if candidates else len(raw)
              compressed = raw[data_start : data_start + compressed_size]
              if compression == 0:
                  plain = compressed
              elif compression == 8:
                  plain = zlib.decompress(compressed, -15)
              else:
                  raise RuntimeError(f"Unsupported compression {compression}: {name}")
              actual_crc = binascii.crc32(plain) & 0xFFFFFFFF
              if actual_crc != expected_crc or len(plain) != uncompressed_size:
                  issues[name] = {
                      "expected_crc": f"{expected_crc:08x}",
                      "actual_crc": f"{actual_crc:08x}",
                      "expected_size": uncompressed_size,
                      "actual_size": len(plain),
                      "trailing_bytes": actual_end - (data_start + compressed_size),
                  }
              entries[name] = plain
              position = actual_end

          if len(entries) != 51:
              raise RuntimeError(f"Expected 51 local ZIP records, recovered {len(entries)}")

          repaired: dict[str, bytes] = {}

          def decode_png(name: str, truncated: bool) -> Image.Image:
              ImageFile.LOAD_TRUNCATED_IMAGES = truncated
              image = Image.open(io.BytesIO(entries[name]))
              image.load()
              return image.convert("RGBA")

          mirror_sources = {
              "layers/eye_R_angry.png": "layers/eye_L_angry.png",
              "layers/thigh_L.png": "layers/thigh_R.png",
              "layers/upper_arm_R.png": "layers/upper_arm_L.png",
              "layers/oyen_full_neutral.png": "layers/body_base.png",
          }
          repairs: dict[str, str] = {}
          for name, payload in entries.items():
              if not name.endswith(".png"):
                  repaired[name] = payload
                  continue
              try:
                  image = decode_png(name, False)
                  method = "decoded"
              except Exception as first_error:
                  try:
                      image = decode_png(name, True)
                      method = f"truncated-recovery:{type(first_error).__name__}"
                  except Exception as second_error:
                      source_name = mirror_sources.get(name)
                      if not source_name:
                          raise RuntimeError(
                              f"PNG {name} cannot be repaired: {second_error}"
                          ) from second_error
                      image = ImageOps.mirror(decode_png(source_name, True))
                      method = f"mirrored:{source_name}"
              output = io.BytesIO()
              image.save(output, format="PNG", optimize=True)
              repaired[name] = output.getvalue()
              if name in issues or method != "decoded":
                  repairs[name] = method
          ImageFile.LOAD_TRUNCATED_IMAGES = False

          valid_zip = Path("/tmp/oyen_2d_assets_valid.zip")
          with zipfile.ZipFile(
              valid_zip,
              "w",
              compression=zipfile.ZIP_DEFLATED,
              compresslevel=9,
          ) as archive:
              for name in entries:
                  info = zipfile.ZipInfo(name)
                  info.date_time = (2026, 7, 23, 0, 0, 0)
                  info.compress_type = zipfile.ZIP_DEFLATED
                  info.external_attr = 0o644 << 16
                  archive.writestr(info, repaired[name])

          with zipfile.ZipFile(valid_zip, "r") as archive:
              if len(archive.namelist()) != 51 or archive.testzip() is not None:
                  raise RuntimeError("Rebuilt asset ZIP failed integrity validation")
              for name in archive.namelist():
                  if name.endswith(".png"):
                      image = Image.open(io.BytesIO(archive.read(name)))
                      image.load()

          valid_bytes = valid_zip.read_bytes()
          digest = hashlib.sha256(valid_bytes).hexdigest()
          valid_base64 = base64.b64encode(valid_bytes).decode("ascii")
          part_length = ((len(valid_base64) + 11) // 12 + 3) // 4 * 4
          new_parts = [
              valid_base64[index : index + part_length]
              for index in range(0, len(valid_base64), part_length)
          ]
          if len(new_parts) != 12:
              raise RuntimeError(f"Rebuilt bundle produced {len(new_parts)} parts")
          for path, content in zip(part_paths, new_parts, strict=True):
              path.write_text(content, encoding="ascii")

          bundle_path = Path("hf_space/oyen_2d_asset_bundle.py")
          bundle_source = bundle_path.read_text(encoding="utf-8")
          bundle_source, count = re.subn(
              r'EXPECTED_SHA256 = "[0-9a-f]{64}"',
              f'EXPECTED_SHA256 = "{digest}"',
              bundle_source,
              count=1,
          )
          if count != 1:
              raise RuntimeError("Could not update EXPECTED_SHA256")
          bundle_path.write_text(bundle_source, encoding="utf-8")

          report = {
              "schema_version": "oyen.2d-asset-repair.v1",
              "source_sha256": hashlib.sha256(raw).hexdigest(),
              "valid_sha256": digest,
              "valid_zip_bytes": len(valid_bytes),
              "entry_count": len(entries),
              "recovered_source_issues": issues,
              "png_repairs": repairs,
              "part_count": len(new_parts),
          }
          Path("hf_space/oyen_2d_asset_repair_report.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, indent=2))
          PY

      - name: Verify rebuilt bundle before commit
        run: |
          PYTHONPATH=hf_space python - <<'PY'
          import tempfile
          from oyen_2d_asset_bundle import materialize_asset_zip, validate_asset_bundle
          from oyen_2d_builder import validate_asset_pack
          with tempfile.TemporaryDirectory() as tmp:
              path = materialize_asset_zip(tmp)
              print(validate_asset_pack(path))
          print(validate_asset_bundle())
          PY

      - name: Commit repaired asset archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hf_space/oyen_2d_asset_parts hf_space/oyen_2d_asset_bundle.py hf_space/oyen_2d_asset_repair_report.json
          git commit -m "fix: rebuild valid Oyen 2D transparent asset archive"
          git push origin HEAD:agent/oyen-2d-stages-1-7
