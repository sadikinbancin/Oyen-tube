name: Validate Oyen Purba 2D Stages 1-7

on:
  push:
    branches: [main, agent/oyen-2d-stages-1-7]
    paths:
      - "hf_space/**"
      - "tests/test_oyen_*.py"
      - ".github/workflows/validate-oyen-v02.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: oyen-v06-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Mark validation pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d '{"state":"pending","context":"oyen-v06/validate","description":"Validating Oyen 2D stages 1-7"}'
      - name: Validate committed stages
        id: checks
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pip install --quiet "pillow>=10,<12"
          {
            test "$(find hf_space/oyen_2d_asset_parts -name '*.b64' | wc -l)" -eq 12
            test "$(find hf_space/oyen_2d_builder_parts -name '*.b64' | wc -l)" -eq 4
            python -m py_compile \
              hf_space/app_v04.py \
              hf_space/oyen_2d_asset_bundle.py \
              hf_space/oyen_2d_builder.py \
              hf_space/oyen_2d_director.py \
              hf_space/oyen_2d_runtime.py \
              tests/test_oyen_2d_director.py \
              tests/test_oyen_2d_pipeline.py
            PYTHONPATH=hf_space python -m unittest discover -s tests -p 'test_oyen_2d*.py' -v
            python - <<'PY'
          import json, sys, tempfile
          from pathlib import Path
          sys.path.insert(0, "hf_space")
          from oyen_2d_asset_bundle import materialize_asset_zip
          from oyen_2d_builder import build_2d_blender_script, validate_asset_pack
          from oyen_2d_director import ACTION_LIBRARY, build_2d_motion_plan, compile_nla_timeline

          audit = json.loads(Path("hf_space/oyen_2d_stage_audit.json").read_text())
          assert len(audit["stages"]) == 7
          assert all(item["status"] == "implemented" for item in audit["stages"].values())
          with tempfile.TemporaryDirectory() as tmp:
              asset_zip = materialize_asset_zip(tmp)
              proof = validate_asset_pack(asset_zip, "hf_space/oyen_2d_layer_manifest.json")
          assert proof["png_count"] >= 40
          assert proof["bone_count"] >= 25
          assert len(ACTION_LIBRARY) == 7
          plan = build_2d_motion_plan(
              "Oyen berjalan ke kanan, menoleh ke kamera, melambaikan tangan, lalu tersenyum dan mengibaskan ekornya.",
              6,
              12,
          )
          timeline = compile_nla_timeline(plan)
          script = build_2d_blender_script({
              "job_id": "v06-ci",
              "motion_plan": plan,
              "compiled_timeline": timeline,
              "stage_audit": audit,
              "render": {"width": 360, "height": 640, "aspect_ratio": "9:16"},
          })
          compile(script, "oyen_2d_scene.py", "exec")
          for marker in (
              "Oyen_Purba_2D_Rig",
              "OYEN_2D_ASSETS count=",
              "OYEN_2D_BONES count=",
              "OYEN_2D_ACTIONS count=",
              "OYEN_2D_NLA strips=",
              "OYEN_2D_QA frames=",
              "OYEN_2D_LIBRARY_ONLY true",
              "OYEN_2D_RENDER_SUCCESS",
          ):
              assert marker in script, marker
          print(
              "OYEN_V06_STAGE_1_TO_7_OK "
              f"pngs={proof['png_count']} layers={proof['layer_count']} "
              f"bones={proof['bone_count']} actions={len(ACTION_LIBRARY)} "
              f"strips={len(timeline['strips'])}"
          )
          PY
          } 2>&1 | tee /tmp/oyen-v06-validation.log
      - name: Publish diagnostics
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTCOME: ${{ steps.checks.outcome }}
        run: |
          {
            echo "# Oyen Purba 2D Stages 1-7 validation diagnostics"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Outcome: \`${OUTCOME}\`"
            echo
            echo '```text'
            tail -c 28000 /tmp/oyen-v06-validation.log 2>/dev/null || true
            echo '```'
          } > /tmp/latest-v06.md
          rm -rf /tmp/v06-diag
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/v06-diag
          cd /tmp/v06-diag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diag-work
          git rm -rf .
          cp /tmp/latest-v06.md latest.md
          git add latest.md
          git commit -m "v06 diagnostics: ${GITHUB_SHA::7}"
          git push --force origin HEAD:v06-diagnostics
      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTCOME: ${{ steps.checks.outcome }}
        run: |
          if [ "$OUTCOME" = success ]; then
            state=success
            description="Oyen 2D stages 1-7 assets, rig, actions and runtime are valid"
          else
            state=failure
            description="Oyen 2D stages 1-7 validation failed"
          fi
          payload=$(printf '{"state":"%s","context":"oyen-v06/validate","description":"%s"}' "$state" "$description")
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$payload"
      - name: Fail on validation error
        if: steps.checks.outcome != 'success'
        run: exit 1
