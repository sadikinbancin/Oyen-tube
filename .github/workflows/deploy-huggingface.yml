name: Deploy Oyen to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "hf_space/**"
      - ".github/workflows/deploy-huggingface.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: oyen-huggingface-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync, render MP4, and verify lako123/Belajarh-ani
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Mark deployment pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data '{"state":"pending","context":"huggingface-space/deploy","description":"Deploying and smoke-rendering Oyen MP4"}'

      - name: Checkout GitHub repository
        uses: actions/checkout@v4

      - name: Deploy Gradio Space
        id: deploy
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: lako123
          HF_SPACE: lako123/Belajarh-ani
        run: |
          set -euo pipefail

          test -n "$HF_TOKEN" || { echo "HF_TOKEN secret is missing"; exit 1; }
          test -f hf_space/app.py || { echo "hf_space/app.py is missing"; exit 1; }
          test -f hf_space/README.md || { echo "hf_space/README.md is missing"; exit 1; }
          test -f hf_space/requirements.txt || { echo "hf_space/requirements.txt is missing"; exit 1; }
          test -f hf_space/packages.txt || { echo "hf_space/packages.txt is missing"; exit 1; }
          grep -qx "blender" hf_space/packages.txt || { echo "Blender package is missing"; exit 1; }

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install

          rm -rf /tmp/oyen-hf-space
          git clone "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" /tmp/oyen-hf-space
          rsync -av --delete --exclude=".git/" hf_space/ /tmp/oyen-hf-space/

          cd /tmp/oyen-hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "Hugging Face Space is already up to date."
            exit 0
          fi

          git commit -m "Deploy Oyen from GitHub ${GITHUB_SHA::7}"
          git push origin HEAD:main

      - name: Wait for healthy Gradio MP4 endpoint
        id: health
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        env:
          SPACE_CONFIG: https://lako123-belajarh-ani.hf.space/config
        run: |
          set -euo pipefail
          echo "Waiting for Hugging Face build and startup..."

          for attempt in $(seq 1 80); do
            HTTP_CODE=$(curl \
              --silent \
              --show-error \
              --location \
              --max-time 20 \
              --output /tmp/oyen-space-config.json \
              --write-out "%{http_code}" \
              "$SPACE_CONFIG" || true)

            if [ "$HTTP_CODE" = "200" ] && grep -q "render_mp4" /tmp/oyen-space-config.json; then
              echo "Space is running and /render_mp4 is registered."
              exit 0
            fi

            echo "Attempt ${attempt}/80: HTTP ${HTTP_CODE}; Space is still building or starting."
            sleep 15
          done

          echo "Space did not become healthy in time."
          if [ -f /tmp/oyen-space-config.json ]; then
            tail -c 4000 /tmp/oyen-space-config.json || true
          fi
          exit 1

      - name: Set up Python for MP4 smoke test
        if: steps.health.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render and validate a real MP4
        id: smoke
        if: steps.health.outcome == 'success'
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          {
            python -m pip install --quiet "gradio_client==1.13.3"
            python - <<'PY'
          from __future__ import annotations

          import os
          import shutil
          from pathlib import Path
          from typing import Any, Iterable

          from gradio_client import Client


          def values(value: Any) -> Iterable[str]:
              if value is None:
                  return
              if isinstance(value, (str, Path)):
                  yield str(value)
                  return
              if isinstance(value, dict):
                  for item in value.values():
                      yield from values(item)
                  return
              if isinstance(value, (list, tuple)):
                  for item in value:
                      yield from values(item)
                  return
              path = getattr(value, "path", None)
              if path:
                  yield str(path)


          client = Client(
              "https://lako123-belajarh-ani.hf.space",
              token=os.environ.get("HF_TOKEN"),
              verbose=True,
          )
          result = client.predict(
              "Oyen berjalan dua langkah, menoleh ke kamera, lalu mengibaskan ekornya.",
              "3D Blender",
              "Oyen Cartoon",
              3,
              "9:16",
              12,
              "360p cepat",
              False,
              api_name="/render_mp4",
          )

          print("SMOKE_RESULT:", result)
          candidates = []
          for raw in values(result):
              path = Path(raw)
              if path.suffix.lower() == ".mp4" and path.is_file():
                  candidates.append(path)

          if not candidates:
              raise RuntimeError("The Space returned no downloadable MP4 file")

          video = max(candidates, key=lambda item: item.stat().st_size)
          if video.stat().st_size < 1024:
              raise RuntimeError(f"MP4 is too small: {video.stat().st_size} bytes")

          target = Path("/tmp/oyen-smoke-test.mp4")
          shutil.copy2(video, target)
          print(f"OYEN_MP4_SMOKE_SUCCESS path={target} bytes={target.stat().st_size}")
          PY
          } 2>&1 | tee /tmp/oyen-smoke.log

      - name: Upload smoke-test MP4
        if: steps.smoke.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: oyen-smoke-test-mp4
          path: /tmp/oyen-smoke-test.mp4
          retention-days: 3
          if-no-files-found: error

      - name: Publish diagnostic report branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          set -euo pipefail

          {
            echo "# Oyen MP4 deployment diagnostics"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Deploy: \`${DEPLOY_OUTCOME}\`"
            echo "- Health: \`${HEALTH_OUTCOME}\`"
            echo "- Smoke MP4: \`${SMOKE_OUTCOME}\`"
            echo
            echo '```text'
            if [ -f /tmp/oyen-smoke.log ]; then
              tail -c 14000 /tmp/oyen-smoke.log
            else
              echo "Smoke test was not executed."
              if [ -f /tmp/oyen-space-config.json ]; then
                echo
                echo "Space config response:"
                tail -c 6000 /tmp/oyen-space-config.json
              fi
            fi
            echo
            echo '```'
          } > /tmp/oyen-diagnostics.md

          rm -rf /tmp/oyen-diagnostics-repo
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/oyen-diagnostics-repo
          cd /tmp/oyen-diagnostics-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diagnostics-work
          git rm -rf .
          cp /tmp/oyen-diagnostics.md latest.md
          git add latest.md
          git commit -m "diagnostics: ${GITHUB_SHA::7}"
          git push --force origin HEAD:diagnostics

      - name: Publish deployment status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          set -euo pipefail

          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$HEALTH_OUTCOME" = "success" ] && [ "$SMOKE_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Oyen deployed and produced a valid MP4"
          else
            STATE="failure"
            DESCRIPTION="Oyen deploy, health check, or MP4 render failed"
          fi

          PAYLOAD=$(printf '{"state":"%s","context":"huggingface-space/deploy","description":"%s","target_url":"https://huggingface.co/spaces/lako123/Belajarh-ani"}' "$STATE" "$DESCRIPTION")

          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "$PAYLOAD"

      - name: Deployment summary
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          echo "### Oyen Hugging Face deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Push outcome: \`${DEPLOY_OUTCOME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runtime health: \`${HEALTH_OUTCOME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Real MP4 smoke render: \`${SMOKE_OUTCOME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Diagnostic branch: \`diagnostics/latest.md\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow unless MP4 was produced
        if: steps.deploy.outcome != 'success' || steps.health.outcome != 'success' || steps.smoke.outcome != 'success'
        run: exit 1
