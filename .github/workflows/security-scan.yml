name: Security Scan

on:
  schedule:
    - cron: "0 3 * * 0"
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
      - ".github/workflows/security-scan.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
      - ".github/workflows/security-scan.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security scanners
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Run Bandit safely
        run: |
          if [ -d src ]; then
            bandit -r src --exit-zero -f json -o bandit-results.json
          else
            printf '{"results":[],"errors":[]}' > bandit-results.json
          fi

      - name: Run dependency audit without breaking unrelated builds
        run: |
          set +e
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt -f json -o pip-audit-results.json
          elif [ -f pyproject.toml ]; then
            pip-audit . -f json -o pip-audit-results.json
          else
            printf '[]' > pip-audit-results.json
          fi
          code=$?
          echo "pip-audit exit code: ${code}; report is preserved for review."
          test -f pip-audit-results.json || printf '[]' > pip-audit-results.json
          exit 0

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-results.json
            pip-audit-results.json
          retention-days: 7
          if-no-files-found: error

      - name: Security scan summary
        run: |
          echo "Security scanners completed and reports were uploaded."
