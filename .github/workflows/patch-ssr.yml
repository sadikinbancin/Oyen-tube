name: Patch Oyen Gradio SSR

on:
  push:
    branches: [fix/oyen-v06-disable-gradio-ssr]
    paths: [".github/workflows/patch-ssr.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/oyen-v06-disable-gradio-ssr
      - name: Disable experimental SSR and remove patch workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('hf_space/app_v04.py')
          text = path.read_text(encoding='utf-8')
          old = 'demo.queue(default_concurrency_limit=1, max_size=4).launch()'
          new = 'demo.queue(default_concurrency_limit=1, max_size=4).launch(ssr_mode=False)'
          if old not in text:
              raise SystemExit('Expected Gradio launch line not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-ssr.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hf_space/app_v04.py .github/workflows/patch-ssr.yml
          git commit -m "fix: disable Gradio SSR for ZeroGPU API calls"
          git push origin HEAD:fix/oyen-v06-disable-gradio-ssr
