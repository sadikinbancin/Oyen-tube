name: Deploy and Verify Oyen Purba 2D V0.6

on:
  push:
    branches: [main]
    paths:
      - "hf_space/**"
      - "scripts/verify_live_oyen_v06.py"
      - ".github/workflows/deploy-huggingface.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: oyen-huggingface-deploy
  cancel-in-progress: false

jobs:
  deploy-and-test:
    name: Deploy and live-render Oyen 2D
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - name: Mark deployment pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d '{"state":"pending","context":"huggingface-space/deploy","description":"Deploying and live-rendering Oyen V0.6"}'

      - name: Validate deployment source
        id: source
        continue-on-error: true
        run: |
          set -o pipefail
          {
            set -euo pipefail
            test -f hf_space/app_v04.py
            test -f hf_space/app_v06.py
            test -f hf_space/oyen_2d_runtime.py
            test -f hf_space/requirements.txt
            test -f scripts/verify_live_oyen_v06.py
            test "$(find hf_space/oyen_2d_asset_parts -name '*.b64' | wc -l)" -eq 12
            grep -q '^APP_VERSION = "0.6.0"' hf_space/app_v04.py
            grep -q '^APP_VERSION = "0.6.0"' hf_space/app_v06.py
            grep -q '^import spaces$' hf_space/app_v04.py
            grep -q '@spaces.GPU(duration=_zerogpu_duration)' hf_space/app_v04.py
            grep -q 'from app_v06 import demo' hf_space/app_v04.py
            grep -q '^spaces' hf_space/requirements.txt
            grep -q '^app_file: app_v04.py$' hf_space/README.md
            grep -q 'cancel-in-progress: false' .github/workflows/deploy-huggingface.yml
            ! grep -q 'request_space_hardware' .github/workflows/deploy-huggingface.yml
            python -m py_compile scripts/verify_live_oyen_v06.py
            echo "OYEN_DEPLOY_SOURCE_OK"
          } 2>&1 | tee /tmp/oyen-source.log

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deployment clients
        run: python -m pip install --quiet "huggingface_hub>=1,<2" "gradio_client>=1,<2" "pillow>=10,<12"

      - name: Inspect current Space runtime
        id: runtime
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          {
            set -euo pipefail
            test -n "$HF_TOKEN"
            python - <<'PY'
          import os
          from huggingface_hub import HfApi

          runtime = HfApi(token=os.environ["HF_TOKEN"]).get_space_runtime(
              repo_id="lako123/Belajarh-ani"
          )
          print(
              "HF_RUNTIME_BEFORE_SYNC "
              f"stage={runtime.stage} hardware={runtime.hardware} "
              f"requested={runtime.requested_hardware}"
          )
          PY
          } 2>&1 | tee /tmp/oyen-runtime.log

      - name: Sync GitHub source to Hugging Face
        id: deploy
        if: steps.source.outcome == 'success'
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          {
            set -euo pipefail
            test -n "$HF_TOKEN"
            rm -rf /tmp/oyen-hf-space
            git clone "https://lako123:${HF_TOKEN}@huggingface.co/spaces/lako123/Belajarh-ani" /tmp/oyen-hf-space
            rsync --archive --delete --exclude '.git' hf_space/ /tmp/oyen-hf-space/
            cd /tmp/oyen-hf-space
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            if git diff --cached --quiet; then
              echo "Space already matches GitHub."
            else
              git commit -m "Deploy Oyen V0.6 from GitHub ${GITHUB_SHA::7}"
              git push origin HEAD:main
            fi
            echo "OYEN_HF_SYNC_OK"
          } 2>&1 | tee /tmp/oyen-deploy.log

      - name: Wait for live application
        id: health
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          {
            set -euo pipefail
            for attempt in $(seq 1 120); do
              code=$(curl --silent --location --max-time 20 \
                --output /tmp/space-config.json \
                --write-out "%{http_code}" \
                "https://lako123-belajarh-ani.hf.space/config" || true)
              if [ "$code" = "200" ] \
                && grep -q 'render_mp4' /tmp/space-config.json \
                && grep -q 'zerogpu_healthcheck' /tmp/space-config.json \
                && grep -q 'Oyen Purba 2D Cutout Studio' /tmp/space-config.json \
                && grep -q '2D Cutout Blender' /tmp/space-config.json; then
                echo "OYEN_HF_HEALTH_OK attempt=${attempt}"
                exit 0
              fi
              if [ $((attempt % 6)) -eq 0 ]; then
                echo "--- runtime attempt ${attempt} ---"
                curl --silent --location --max-time 20 \
                  "https://huggingface.co/api/spaces/lako123/Belajarh-ani/runtime" || true
                echo
                tail -c 3000 /tmp/space-config.json 2>/dev/null || true
                echo
              fi
              echo "Attempt ${attempt}/120: HTTP ${code}."
              sleep 15
            done
            echo "Space did not expose the expected V0.6 APIs."
            exit 1
          } 2>&1 | tee /tmp/oyen-health.log

      - name: Authenticated live render verification
        id: smoke
        if: steps.health.outcome == 'success'
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          python scripts/verify_live_oyen_v06.py 2>&1 | tee /tmp/oyen-v06-live-smoke.log

      - name: Upload verified live outputs
        if: steps.smoke.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: oyen-purba-2d-v06-live-verified
          path: |
            /tmp/oyen-purba-2d-v06.mp4
            /tmp/oyen-purba-2d-v06.blend
            /tmp/oyen-purba-2d-v06-contact-sheet.jpg
            /tmp/oyen-purba-2d-v06.log
            /tmp/oyen-v06-live-smoke.log
          retention-days: 3
          if-no-files-found: error

      - name: Publish live diagnostics branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ steps.source.outcome }}
          RUNTIME: ${{ steps.runtime.outcome }}
          DEPLOY: ${{ steps.deploy.outcome }}
          HEALTH: ${{ steps.health.outcome }}
          SMOKE: ${{ steps.smoke.outcome }}
        run: |
          {
            echo "# Oyen Purba 2D V0.6 live deployment diagnostics"
            echo
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Source validation: \`${SOURCE}\`"
            echo "- Runtime inspection: \`${RUNTIME}\`"
            echo "- Hugging Face sync: \`${DEPLOY}\`"
            echo "- Live health: \`${HEALTH}\`"
            echo "- Live render: \`${SMOKE}\`"
            echo
            for file in /tmp/oyen-source.log /tmp/oyen-runtime.log /tmp/oyen-deploy.log /tmp/oyen-health.log /tmp/oyen-v06-live-smoke.log; do
              echo "## $(basename "$file")"
              echo '```text'
              if [ -f "$file" ]; then tail -c 32000 "$file"; else echo "Step did not run."; fi
              echo
              echo '```'
            done
          } > /tmp/oyen-live-latest.md

          rm -rf /tmp/oyen-live-diag
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/oyen-live-diag
          cd /tmp/oyen-live-diag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diagnostics-work
          git rm -rf .
          cp /tmp/oyen-live-latest.md latest.md
          git add latest.md
          git commit -m "live deploy diagnostics: ${GITHUB_SHA::7}"
          git push --force origin HEAD:v06-live-diagnostics

      - name: Publish final deployment status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ steps.source.outcome }}
          DEPLOY: ${{ steps.deploy.outcome }}
          HEALTH: ${{ steps.health.outcome }}
          SMOKE: ${{ steps.smoke.outcome }}
        run: |
          if [ "$SOURCE" = success ] && [ "$DEPLOY" = success ] && [ "$HEALTH" = success ] && [ "$SMOKE" = success ]; then
            state=success
            description="Oyen V0.6 live CPU render and ZeroGPU probe verified"
          else
            state=failure
            description="Oyen V0.6 deployment or live render failed"
          fi
          payload=$(printf '{"state":"%s","context":"huggingface-space/deploy","description":"%s","target_url":"https://huggingface.co/spaces/lako123/Belajarh-ani"}' "$state" "$description")
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$payload"

      - name: Fail unless live deployment is verified
        if: steps.source.outcome != 'success' || steps.deploy.outcome != 'success' || steps.health.outcome != 'success' || steps.smoke.outcome != 'success'
        run: exit 1
